<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Neon Air Draw - JRN Studio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #ui-layer {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 15px; background: rgba(20, 20, 20, 0.8);
            padding: 12px 25px; border-radius: 50px; border: 1px solid #333; backdrop-filter: blur(10px);
        }

        .tool { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        input[type="color"] { border: none; width: 30px; height: 30px; cursor: pointer; background: none; }
        input[type="range"] { width: 100px; accent-color: #00f2ff; }

        #save-btn {
            background: #00f2ff; color: #000; border: none; padding: 8px 15px;
            border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        #save-btn:hover { background: #fff; box-shadow: 0 0 15px #00f2ff; }

        #video-preview {
            position: absolute; bottom: 20px; right: 20px; width: 180px;
            border-radius: 12px; border: 2px solid #333; transform: scaleX(-1);
        }

        canvas { position: absolute; top: 0; left: 0; cursor: none; }
        
        .status-badge {
            position: absolute; bottom: 20px; left: 20px; font-size: 12px;
            padding: 5px 15px; border-radius: 5px; border: 1px solid #444;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="tool">
            <input type="color" id="colorPicker" value="#00f2ff">
        </div>
        <div class="tool">
            <input type="range" id="thickness" min="3" max="25" value="8">
        </div>
        <button id="save-btn">Download Art</button>
    </div>

    <canvas id="canvas"></canvas>
    <video id="webcam" autoplay playsinline style="display:none;"></video>
    <video id="video-preview" autoplay playsinline></video>

    <div class="status-badge">Mode: <span id="mode">Detecting...</span></div>

    <script>
        const video = document.getElementById('webcam');
        const preview = document.getElementById('video-preview');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const modeEl = document.getElementById('mode');
        const saveBtn = document.getElementById('save-btn');

        let lastX = 0, lastY = 0;
        let isDrawing = false;
        
        // Smoothing factors
        let smoothX = 0, smoothY = 0;
        const smoothing = 0.4; 

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const indexTip = hand[8];
                const indexPip = hand[6];
                const middleTip = hand[12];
                const thumbTip = hand[4];

                // Coordinates with mirroring
                const targetX = (1 - indexTip.x) * canvas.width;
                const targetY = indexTip.y * canvas.height;

                // Apply Smoothing (EMA)
                smoothX += (targetX - smoothX) * smoothing;
                smoothY += (targetY - smoothY) * smoothing;

                // Logic: Index Up = Draw, Palm Open = Clear, Fist = Pause
                const isIndexUp = indexTip.y < indexPip.y;
                const isMiddleUp = middleTip.y < hand[10].y;
                const isRingUp = hand[16].y < hand[14].y;

                if (isIndexUp && isMiddleUp && isRingUp) {
                    modeEl.innerText = "ERASING";
                    initCanvas(); 
                    isDrawing = false;
                } else if (isIndexUp && !isMiddleUp) {
                    modeEl.innerText = "DRAWING";
                    if (isDrawing) {
                        drawNeon(lastX, lastY, smoothX, smoothY);
                    }
                    lastX = smoothX;
                    lastY = smoothY;
                    isDrawing = true;
                } else {
                    modeEl.innerText = "IDLE / PAUSED";
                    isDrawing = false;
                }
            }
        }

        function drawNeon(x1, y1, x2, y2) {
            const color = document.getElementById('colorPicker').value;
            const width = document.getElementById('thickness').value;

            // 1. Outer Glow
            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            // 2. Inner Bright Core
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = width / 4;
            ctx.stroke();
        }

        // Save Function
        saveBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = 'my-air-art.png';
            link.href = canvas.toDataURL();
            link.click();
        };

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.8,
            minTrackingConfidence: 0.8
        });
        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({image: video});
                preview.srcObject = video.srcObject; // Mirror to preview
            },
            width: 1280, height: 720
        });
        camera.start();

    </script>
</body>
</html>
